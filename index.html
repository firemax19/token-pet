<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Token Pet</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="pet-card drag-zone" data-tauri-drag-region>
      <section class="chrome" data-tauri-drag-region>
        <div class="tools">
          <button class="tool minimize" id="minimizeButton" title="Minimize to tray" aria-label="Minimize to tray">
            <svg viewBox="0 0 24 24"><path d="M5 12h14v2H5v-2z"/></svg>
          </button>
          <button class="tool layout" id="layoutButton" title="切换紧凑版" aria-label="切换紧凑版" aria-pressed="false">
            <svg class="icon-compact" viewBox="0 0 24 24"><path d="M4 5h6v2H7.4l3.3 3.3-1.4 1.4L6 8.4V11H4V5zm10 0h6v6h-2V8.4l-3.3 3.3-1.4-1.4L16.6 7H14V5zM9.3 12.3l1.4 1.4L7.4 17H10v2H4v-6h2v2.6l3.3-3.3zm5.4 0l3.3 3.3V13h2v6h-6v-2h2.6l-3.3-3.3 1.4-1.4z"/></svg>
            <svg class="icon-expanded" viewBox="0 0 24 24"><path d="M5 4h6v2H8.4l3.3 3.3-1.4 1.4L7 7.4V10H5V4zm8 0h6v6h-2V7.4l-3.3 3.3-1.4-1.4L15.6 6H13V4zM10.3 13.3l1.4 1.4L8.4 18H11v2H5v-6h2v2.6l3.3-3.3zm3.4 0l3.3 3.3V14h2v6h-6v-2h2.6l-3.3-3.3 1.4-1.4z"/></svg>
          </button>
          <button class="tool pin is-active" id="pinButton" title="Always on top" aria-label="Always on top">
            <svg viewBox="0 0 24 24"><path d="M16.9 3.2l3.9 3.9-2.2 2.2-.9-.9-4.8 4.8.6 3.4-1.3 1.3-3.1-4.8-4.8-3.1 1.3-1.3 3.4.6 4.8-4.8-.9-.9 2-2zM10.6 14.2l-5.8 5.8-.8-.8 5.8-5.8.8.8z"/></svg>
          </button>
          <button class="tool refresh" id="refreshButton" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 24 24"><path d="M20 6v5h-5l1.9-1.9A6.5 6.5 0 1 0 18.1 16h2.3A8.7 8.7 0 1 1 15.3 5L13 3h5z"/></svg>
          </button>
        </div>
      </section>

      <section class="content" data-tauri-drag-region>
        <div class="tab-row" data-tauri-drag-region>
          <button class="tab-btn active" data-period="today">今日</button>
          <button class="tab-btn" data-period="7d">7日</button>
          <button class="tab-btn" data-period="30d">30日</button>
        </div>
        <div class="token-row" data-tauri-drag-region>
          <span class="token-value" id="tokenValue">0</span>
          <span class="token-label">Token</span>
        </div>
        <div class="sub-row" data-tauri-drag-region>
          <span data-tauri-drag-region>&#20170;&#26085;&#28040;&#32791;</span>
          <svg class="wave" viewBox="0 0 86 18" aria-hidden="true">
            <path d="M2 10 L12 3 L23 14 L34 5 L45 11 L59 4 L84 15" />
          </svg>
        </div>
        <div class="small-stat" id="smallStat" data-tauri-drag-region>0 &#27425;&#35831;&#27714;</div>
      </section>

      <section class="mascot-panel" aria-hidden="true"></section>
      <div class="mascot-stage" data-tauri-drag-region>
        <img class="mascot-layer" id="mascotLayer" src="./assets/mascot-cutout.png" alt="" />
      </div>
      <div class="bottom-neon" aria-hidden="true"></div>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
